services:
  x-rag:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: x-rag
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./.env:/app/.env:ro
    environment:
      - DEBUG=false
      - LOG_LEVEL=INFO
      - VECTOR_STORE_PERSIST_DIR=/app/data/chroma
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 1G
